<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c5d8e8"/>
      <stop offset="55%" stop-color="#e8eef4"/>
      <stop offset="100%" stop-color="#d4e4d0"/>
    </linearGradient>
    <linearGradient id="cliff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a858f"/>
      <stop offset="100%" stop-color="#4a5560"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <ellipse cx="120" cy="90" rx="70" ry="28" fill="#fff" opacity="0.85"/>
  <ellipse cx="620" cy="70" rx="90" ry="32" fill="#fff" opacity="0.75"/>
  <!-- water -->
  <path d="M0 380 Q200 350 400 390 T800 370 L800 500 L0 500 Z" fill="#6ba3c4"/>
  <path d="M0 400 Q220 375 420 405 T800 390" stroke="#dfeef5" stroke-width="3" opacity="0.5"/>
  <!-- cliffs / island -->
  <path d="M60 360 L140 220 L280 200 L420 160 L560 180 L700 210 L760 360 L720 400 L100 410 Z" fill="url(#cliff)"/>
  <path d="M140 220 L280 200 L420 160 L560 180 L700 210 L680 240 L540 210 L400 190 L260 230 L160 250 Z" fill="#5a9e6f"/>
  <!-- path -->
  <path d="M150 360 Q220 300 300 280 Q400 250 480 220 Q560 190 620 160" stroke="#c4a574" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M150 360 Q220 300 300 280 Q400 250 480 220 Q560 190 620 160" stroke="#e8d4a8" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="8 10"/>
  <!-- city square houses -->
  <g transform="translate(100,300)">
    <rect x="0" y="20" width="36" height="28" fill="#e8dcc8" stroke="#5a4a3a"/>
    <polygon points="0,20 18,4 36,20" fill="#c45c26"/>
    <rect x="40" y="24" width="28" height="24" fill="#d4c4a8" stroke="#5a4a3a"/>
    <polygon points="40,24 54,10 68,24" fill="#b84a1f"/>
  </g>
  <!-- steam caves -->
  <g transform="translate(280,240)">
    <ellipse cx="30" cy="40" rx="40" ry="22" fill="#6b7c85"/>
    <ellipse cx="30" cy="38" rx="18" ry="12" fill="#2a3238"/>
    <path d="M20 20 Q25 0 30 18" stroke="#b8d4e8" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M35 18 Q40 -2 45 16" stroke="#b8d4e8" stroke-width="3" fill="none" opacity="0.55"/>
  </g>
  <!-- ruins -->
  <g transform="translate(420,200)">
    <rect x="0" y="10" width="14" height="36" fill="#9aa3ad"/>
    <rect x="20" y="0" width="14" height="46" fill="#8a939c"/>
    <rect x="40" y="18" width="12" height="28" fill="#9aa3ad"/>
  </g>
  <!-- ice keep / boss -->
  <g transform="translate(560,90)">
    <rect x="20" y="40" width="80" height="70" fill="#8fa0b0" stroke="#3d4a55" stroke-width="2"/>
    <rect x="0" y="55" width="24" height="55" fill="#7a8a9a" stroke="#3d4a55"/>
    <rect x="96" y="55" width="24" height="55" fill="#7a8a9a" stroke="#3d4a55"/>
    <polygon points="20,40 60,10 100,40" fill="#c45c26"/>
    <polygon points="0,55 12,35 24,55" fill="#c45c26"/>
    <polygon points="96,55 108,35 120,55" fill="#c45c26"/>
    <rect x="50" y="70" width="20" height="40" fill="#2a3238"/>
    <circle cx="60" cy="28" r="6" fill="#a8d4ff" opacity="0.8"/>
  </g>
  <!-- trees -->
  <circle cx="200" cy="270" r="14" fill="#3d7a4a"/>
  <circle cx="360" cy="230" r="12" fill="#2f6b3c"/>
  <circle cx="500" cy="200" r="11" fill="#3d7a4a"/>
</svg>
